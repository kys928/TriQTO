# Full Phase 15.6 curriculum; launch only after the vectorized smoke run passes.
schema_version: triqto.training.phase14.v1
run_name: triqto_phase15_6_model_ready_full
seed: 2026
stages:
  - name: single_task_foundation
    epochs: 3
    tasks: [diagnosis, action_ranking, born_prediction]
  - name: joint_multitask
    epochs: 3
    tasks: [joint_multitask]
  - name: hardware_masked_simulation
    epochs: 2
    tasks: [hardware_masked]
batch_size: 8
gradient_accumulation_steps: 2
max_gradient_norm: 1.0
optimizer:
  name: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999
  epsilon: 0.00000001
  momentum: 0.9
scheduler:
  name: warmup_cosine
  warmup_steps: 100
  minimum_learning_rate_ratio: 0.1
loss:
  diagnosis_type_weight: 1.0
  diagnosis_strength_weight: 0.5
  diagnosis_affected_qubit_weight: 0.5
  action_selection_weight: 1.0
  action_rank_distribution_weight: 0.5
  action_reward_weight: 0.25
  born_kl_weight: 1.0
  born_hellinger_weight: 1.0
  hilbert_to_born_weight: 0.0
  geometry_weight: 0.1
  uncertainty_weighting: false
  privileged_oracle_loss_weight: 0.0
  topology_weight: 0.0
deterministic_algorithms: true
device: auto
dtype: float32
num_workers: 0
checkpoint_every_epochs: 1
keep_best_checkpoint: true
early_stopping_patience: 2
normalize_action_features: false
normalize_topology_features: false
normalize_backend_features: false
max_items: 100000
max_nodes_per_batch: 65536
max_edges_per_batch: 262144
max_gates_per_batch: 262144
max_candidates_per_batch: 65536
max_outcomes_per_batch: 262144
max_hilbert_amplitudes_per_batch: 1
topology_loss_weight: 0.0
