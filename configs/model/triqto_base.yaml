schema_version: triqto.model.phase13.v2
model_name: triqto_base
hidden_dim: 128
graph_message_passing_layers: 4
residual_mlp_layers: 2
node_input_dim: 13
edge_input_dim: 10
gate_input_dim: 16
backend_input_dim: 16
topology_input_dim: 64
action_candidate_feature_dim: 5
action_edit_type_count: 8
hilbert_deformation_dim: 32
topology_prediction_dim: 32
dropout: 0.1
layer_norm_eps: 0.00001
initialization_seed: 130013
use_hilbert: true
use_backend: true
use_topology: true
distortion_labels:
  - phase_like
  - amplitude_like
  - entanglement_like
  - lattice_layout_like
  - noise_readout_like
  - mixed_uncertain
uncertainty_targets:
  - diagnosis
  - action_ranking
  - born_prediction
  - hilbert_deformation
  - topology_audit
topology_loss_weight: 0.0
