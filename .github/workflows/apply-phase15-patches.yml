name: Apply Phase 15 Integration Patches

on:
  push:
    branches: [phase-15-evaluation-reports]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-15-evaluation-reports
          fetch-depth: 0
      - name: Patch shared loaders and documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              target = Path(path)
              text = target.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one match, found {count}")
              target.write_text(text.replace(old, new, 1))

          replace_once(
              "src/triqto/training/datamodule.py",
              '    if split not in {"train", "validation"}:\n        raise ValueError("Phase 14 optimization loader supports only train/validation")',
              '    if split not in {"train", "validation", "test"}:\n        raise ValueError("Phase 14/15 loader supports only train/validation/test")',
              "evaluation test split support",
          )

          source = Path("src/triqto/evaluation/source.py")
          text = source.read_text()
          text = text.replace(
              "from triqto.model import load_model_config, model_architecture_id, model_config_id",
              "from triqto.model import (\n    load_model_config,\n    model_architecture_id,\n    model_config_id,\n    model_config_to_dict,\n)",
          )
          text = text.replace(
              "    snapshot_managed_files,\n)",
              "    snapshot_managed_files,\n    training_config_to_dict,\n)",
          )
          old = '''    if checkpoint_metadata["training_config"] != training_config.__class__(**checkpoint_metadata["training_config"]).__class__(**checkpoint_metadata["training_config"]).__dict__:
        # The checkpoint is validated below by exact persisted payload comparisons.
        pass
    if checkpoint_metadata["data_spec"] != data_spec.to_dict():
'''
          new = '''    if checkpoint_metadata["training_config"] != training_config_to_dict(training_config):
        raise ValueError("Selected checkpoint training config mismatch")
    if checkpoint_metadata["model_config"] != model_config_to_dict(model_config):
        raise ValueError("Selected checkpoint model config mismatch")
    if checkpoint_metadata["data_spec"] != data_spec.to_dict():
'''
          if text.count(old) != 1:
              raise RuntimeError("checkpoint config comparison block mismatch")
          source.write_text(text.replace(old, new, 1))

          evaluator = Path("src/triqto/evaluation/evaluator.py")
          text = evaluator.read_text()
          old = '''def _safe_float(value: Any, name: str) -> float:
    result = float(value)
    if not np.isfinite(result):
        raise ValueError(f"{name} must be finite")
    return result
'''
          new = '''def _safe_float(value: Any, name: str) -> float:
    if isinstance(value, Tensor):
        if value.numel() != 1:
            raise ValueError(f"{name} must be scalar")
        result = float(value.detach().cpu().item())
    else:
        result = float(value)
    if not np.isfinite(result):
        raise ValueError(f"{name} must be finite")
    return result
'''
          if text.count(old) != 1:
              raise RuntimeError("safe-float block mismatch")
          evaluator.write_text(text.replace(old, new, 1))

          readme = Path("README.md")
          text = readme.read_text()
          if "## Phase 15 deterministic evaluation" not in text:
              text += '''

## Phase 15 deterministic evaluation

Phase 15 restores one validated Phase 14 checkpoint and evaluates only the untouched Phase 12 `test` split. It publishes immutable per-item evidence, complete per-graph Born metrics, generalization tables, diagnosis/action calibration, inference-time `no_topology` and `no_hilbert` ablations, and optional exact-objective comparisons against the Phase 10 baseline suite.

No gradients, optimizer updates, validation reuse, real hardware execution, topology loss, universal-correction claim, or quantum-advantage claim are introduced. See [`docs/EVALUATION_ENGINE.md`](docs/EVALUATION_ENGINE.md).
'''
              readme.write_text(text)

          training_plan = Path("docs/TRAINING_PLAN.md")
          text = training_plan.read_text()
          old = "Phase 15 remains responsible for held-out test evaluation, baseline comparisons, generalization reports, calibration reports, and ablations. Phase 16 remains responsible for real hardware execution and validation."
          new = "Phase 15 now implements held-out test evaluation, optional Phase 10 baseline comparisons, generalization reports, calibration reports, and inference-time stream ablations. Phase 16 remains responsible for real hardware execution and validation."
          if old in text:
              text = text.replace(old, new, 1)
          training_plan.write_text(text)

          architecture = Path("docs/TRI_QTO_ARCHITECTURE.md")
          text = architecture.read_text()
          if "## Phase 15 held-out evaluation" not in text:
              text += '''

## Phase 15 held-out evaluation

Phase 15 restores a validated trained checkpoint and evaluates only Phase 12 `test` rows under `torch.no_grad()`. It reports task metrics, calibration, subgroup generalization, and inference-time topology/Hilbert stream ablations. Optional action-policy comparisons use the exact Phase 10 Born objective while preserving every baseline's privilege metadata.

The topology objective remains inactive at `lambda_top = 0`. Hardware-masked simulation is not hardware evidence, and real hardware execution remains Phase 16.
'''
              architecture.write_text(text)

          Path(".github/workflows/apply-phase15-patches.yml").unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate Phase 15 evaluation with held-out loaders"
          git push origin HEAD:phase-15-evaluation-reports
