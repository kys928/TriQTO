name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / CPU
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --quiet pip==25.1.1 setuptools==80.9.0 wheel==0.45.1
          python -m pip install --quiet -r requirements.txt -c constraints/cpu.txt
          python -m pip install --quiet -e .
          python -m pip check

      - name: Verify dependency profiles and installed CPU packages
        run: |
          python scripts/verify_dependency_pins.py --check-installed
          python -c 'import torch; assert torch.version.cuda is None, torch.version.cuda'
          python -c 'import qiskit, qiskit_aer; print(qiskit.__version__, qiskit_aer.__version__)'

      - name: Compile Python sources
        run: python -m compileall -q src scripts

      - name: Run test suite
        shell: bash
        run: |
          set -o pipefail
          PYTHONPATH=src pytest -q --tb=short 2>&1 | tee pytest-${{ matrix.python-version }}.log

      - name: Verify CPU runtime after tests
        run: |
          python - <<'PY'
          import torch
          import qiskit
          import qiskit_aer
          assert torch.version.cuda is None, torch.version.cuda
          print("torch", torch.__version__)
          print("qiskit", qiskit.__version__)
          print("qiskit_aer", qiskit_aer.__version__)
          PY

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-log-python-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.log
          if-no-files-found: error
          retention-days: 7

      - name: Check patch whitespace
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "$(git merge-base origin/main HEAD)"..HEAD
          else
            git diff --check HEAD^..HEAD
          fi
